# Development docker-compose
version: '3.8'

services:

  db:
    image: postgres:16-alpine
    container_name: shreelance-db-dev
    environment:
      POSTGRES_USER: shreelance
      POSTGRES_PASSWORD: shreelance_password
      POSTGRES_DB: shreelance
    ports:
      - "54321:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: shreelance-valkey-dev
    ports:
      - "63790:6379"
    restart: unless-stopped

volumes:
  pgdata-dev:
